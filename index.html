```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地水利マップ（本番システム）</title>
    
    <!-- Leaflet (地図ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 🌟追加：爆速化するためのクラスター（まとめる）ライブラリ🌟 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background-color: rgba(255, 255, 255, 0.95);
            padding: 20px 40px; border-radius: 8px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #gps-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            padding: 15px 20px; font-size: 16px; font-weight: bold;
            background-color: #007bff; color: white; border: none; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;
        }
        #gps-btn:active { background-color: #0056b3; }
        
        /* 🌟追加：ポップアップの綺麗なデザイン🌟 */
        .popup-title { 
            font-size: 16px; font-weight: bold; color: #333; 
            border-bottom: 2px solid #007bff; margin-bottom: 8px; padding-bottom: 5px; 
            text-align: center;
        }
        .popup-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .popup-table th { background-color: #f8f9fa; text-align: left; padding: 6px; border-bottom: 1px solid #ddd; width: 35%; color: #555;}
        .popup-table td { padding: 6px; border-bottom: 1px solid #ddd; color: #222;}
        .popup-alert { color: white; background-color: #dc3545; padding: 5px; text-align: center; font-weight: bold; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>
    
    <div id="loading">📡 最新データを読み込み中...</div>
    <div id="map"></div>
    <button id="gps-btn">📍 現在地へ</button>

    <script>
        // 1. 地図の初期設定（とりあえず和歌山市役所付近にしておく）
        const map = L.map('map').setView([34.2305, 135.1705], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // APIキー
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby5K-uoeLHnuvgL2BJH-gWcxj3TS1WT6J9zlL_LcNh1nRfYAXKEpZk-61qh6cnCtbLS_g/exec";

        async function loadData() {
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                
                // 🌟変更：7000件のピンを重くならないように「クラスター（まとまり）」で管理する🌟
                const markers = L.markerClusterGroup({
                    disableClusteringAtZoom: 16, // ズームレベル16まで寄ったらピンをバラす
                    maxClusterRadius: 50 // まとめる範囲（ピクセル）
                });

                data.forEach(function(row) {
                    if (!row["緯度"] || !row["経度"]) return;

                    let markerColor = (row["要調査"] === "要点検") ? "red" : "blue";
                    
                    let customIcon = L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    // 🌟変更：ポップアップを表形式（テーブル）にして見やすくする🌟
                    let popupContent = `
                        <div class="popup-title">${row["水利種別"]} (${row["水利番号"]})</div>
                        <table class="popup-table">
                            <tr><th>地区</th><td>${row["地区"] || "-"}</td></tr>
                            <tr><th>区分</th><td>${row["設置区分"] || "-"}</td></tr>
                            <tr><th>前回点検</th><td>${row["前回調査日"] || "未実施"}</td></tr>
                            <tr><th>点検結果</th><td>${row["点検結果"] || "未入力"}</td></tr>
                            <tr><th>異常の種類</th><td>${row["異常の種類"] || "-"}</td></tr>
                            <tr><th>塗装レベル</th><td>${row["塗装レベル"] || "-"}</td></tr>
                            <tr><th>コメント</th><td>${row["コメント"] || "-"}</td></tr>
                        </table>
                    `;
                    
                    if (row["要調査"] === "要点検") {
                        popupContent += `<div class="popup-alert">⚠️ 要点検</div>`;
                    }

                    L.marker([row["緯度"], row["経度"]], {icon: customIcon})
                        .bindPopup(popupContent)
                        .addTo(markers);
                });

                // クラスター化したピンを地図に追加
                map.addLayer(markers);

                document.getElementById('loading').style.display = 'none';

                // 🌟変更：全域ズームを廃止し、データ読み込み完了と同時に現在地へズームする🌟
                map.locate({setView: true, maxZoom: 17});

            } catch (error) {
                alert("データの読み込みに失敗しました。");
                document.getElementById('loading').innerText = "❌ 読み込みエラー";
            }
        }

        loadData();

        // 現在地マーカーを管理する変数
        let currentLocationMarker = null;

        document.getElementById('gps-btn').addEventListener('click', function() {
            map.locate({setView: true, maxZoom: 17});
        });

        // 🌟変更：現在地のピンを青い丸（自分だと分かりやすい）に変更🌟
        map.on('locationfound', function(e) {
            if (currentLocationMarker) {
                map.removeLayer(currentLocationMarker);
            }
            currentLocationMarker = L.circleMarker(e.latlng, {
                radius: 8, fillColor: "#007bff", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 0.9
            }).addTo(map).bindPopup("<b>現在地</b>").openPopup();
        });

        map.on('locationerror', function(e) {
            // 初回起動時などでGPSが取得できない場合は何もしない（和歌山市中心のまま）
            console.log("現在地が取得できませんでした");
        });
    </script>
</body>
</html>
