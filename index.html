```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地水利マップ（本番システム）</title>
    
    <!-- Leaflet (地図ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* 画面上部に表示する「読込中」のデザイン */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 画面右下に表示する現在地ボタンのデザイン */
        #gps-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #gps-btn:active { background-color: #0056b3; }
        
        /* ポップアップ内の文字デザイン */
        .popup-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid #ccc; margin-bottom: 5px; padding-bottom: 3px; }
        .popup-alert { color: red; font-weight: bold; }
    </style>
</head>
<body>
    
    <!-- 読込中メッセージ -->
    <div id="loading">📡 最新データを読み込み中...</div>
    
    <!-- 地図表示エリア -->
    <div id="map"></div>
    
    <!-- 現在地ボタン -->
    <button id="gps-btn">📍 現在地へ</button>

    <script>
        // 1. 地図の初期設定
        const map = L.map('map').setView([34.226, 135.174], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // 🌟 新しく発行した完璧なURL 🌟
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycby5K-uoeLHnuvgL2BJH-gWcxj3TS1WT6J9zlL_LcNh1nRfYAXKEpZk-61qh6cnCtbLS_g/exec";

        // 2. データを取得して地図に表示する機能
        async function loadData() {
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                
                const markers = L.featureGroup().addTo(map);

                data.forEach(function(row) {
                    if (!row["緯度"] || !row["経度"]) return;

                    let markerColor = (row["要調査"] === "要点検") ? "red" : "blue";
                    
                    let customIcon = L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    });

                    // 🌟 12列に厳選されたスッキリ版のポップアップ内容 🌟
                    let popupContent = `
                        <div class="popup-title">${row["水利種別"]} (${row["水利番号"]})</div>
                        <b>地区:</b> ${row["地区"] || "不明"}<br>
                        <b>区分:</b> ${row["設置区分"] || "-"}<br>
                        <b>前回点検:</b> ${row["前回調査日"] || "未実施"}<br>
                        <b>点検結果:</b> ${row["点検結果"] || "未入力"}<br>
                        <b>異常の種類:</b> ${row["異常の種類"] || "-"}<br>
                        <b>塗装レベル:</b> ${row["塗装レベル"] || "-"}<br>
                        <b>コメント:</b> ${row["コメント"] || "-"}
                    `;
                    
                    if (row["要調査"] === "要点検") {
                        popupContent += `<br><span class="popup-alert">⚠️ 要点検</span>`;
                    }

                    L.marker([row["緯度"], row["経度"]], {icon: customIcon})
                        .bindPopup(popupContent)
                        .addTo(markers);
                });

                if (data.length > 0) {
                    map.fitBounds(markers.getBounds());
                }

                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                alert("データの読み込みに失敗しました。");
                document.getElementById('loading').innerText = "❌ 読み込みエラー";
            }
        }

        // 3. ページを開いた瞬間にデータを読み込む
        loadData();

        // 4. 現在地取得ボタンの処理
        document.getElementById('gps-btn').addEventListener('click', function() {
            map.locate({setView: true, maxZoom: 16});
        });

        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup("<b>あなたの現在地</b>").openPopup();
        });

        map.on('locationerror', function(e) {
            alert("現在地が取得できませんでした。");
        });
    </script>
</body>
</html>
