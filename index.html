<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地水利マップ（本番システム）</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #f8fafc; }
        #main-container { position: relative; flex: 1; display: flex; flex-direction: column; height: 100%; }
        #map { flex: 1; width: 100vw; height: 100%; }
        
        #mode-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background-color: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .mode-title { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 30px; text-align: center; }
        .mode-btn { width: 80%; max-width: 300px; padding: 20px; margin-bottom: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; color: white; box-shadow: 0 6px 12px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .mode-view { background-color: #3b82f6; } .mode-edit { background-color: #ef4444; }
        .mode-desc { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 25px; text-align: center; }
        
        #current-mode-badge { position: absolute; top: 10px; left: 50px; z-index: 1000; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; color: white; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #search-panel { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 680px; z-index: 1000; display: none; background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-wrap: wrap; gap: 8px; }
        #search-panel select, #search-panel input { padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; min-width: 110px; }
        #search-panel .date-group { display: flex; align-items: center; gap: 4px; flex-grow: 1.5; min-width: 210px; }
        #search-panel button { padding: 8px 15px; font-size: 13px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; flex-grow: 1; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background-color: rgba(255, 255, 255, 0.95); display: none; padding: 20px 40px; border-radius: 8px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .side-btn-container { position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { padding: 12px 15px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        #search-toggle-btn { background-color: #f59e0b; }
        #list-toggle-btn { background-color: #17a2b8; }
        #today-list-btn { background-color: #8b5cf6; } 
        #gps-btn { background-color: #007bff; }
        
        .marker-hydrant { width: 24px !important; height: 24px !important; margin-left: -12px !important; margin-top: -12px !important; display: flex; align-items: center; justify-content: center; background: transparent; }
        .marker-hydrant::after { content: ''; width: 11px; height: 11px; background-color: #ff3b30; border: 1.5px solid #ffffff; border-radius: 50%; box-shadow: 0 0 3px rgba(0,0,0,0.4); }
        .marker-hydrant.alert-marker::after { border: 1.5px solid #ffcc00; box-shadow: 0 0 5px #ff3b30; animation: pulse 1.5s infinite; }
        .marker-tank { width: 24px !important; height: 24px !important; margin-left: -12px !important; margin-top: -12px !important; display: flex; align-items: center; justify-content: center; background: transparent; }
        .marker-tank::after { content: ''; width: 10px; height: 10px; background-color: #007aff; border: 1.5px solid #ffffff; border-radius: 2px; box-shadow: 0 0 3px rgba(0,0,0,0.4); }
        .marker-tank.alert-marker::after { border: 1.5px solid #ffcc00; box-shadow: 0 0 5px #007aff; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .popup-title { font-size: 15px; font-weight: bold; color: #333; border-bottom: 2px solid #007bff; margin-bottom: 8px; padding-bottom: 5px; text-align: center; }
        .popup-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 8px; }
        .popup-table th { background-color: #f8f9fa; text-align: left; padding: 5px; border-bottom: 1px solid #ddd; width: 35%; color: #555;}
        .popup-table td { padding: 5px; border-bottom: 1px solid #ddd; color: #222;}
        .popup-alert { color: white; background-color: #dc3545; padding: 4px; text-align: center; font-weight: bold; border-radius: 4px; margin-bottom: 8px; font-size: 11px; }

        .form-toggle { display: block; width: 100%; padding: 6px; background: #e2e8f0; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; cursor: pointer; color: #475569; margin-top: 5px; }
        .input-form { display: none; background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; margin-top: 5px; }
        .form-group { margin-bottom: 6px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 2px; color: #64748b; }
        .form-group select, .form-group input { width: 93%; padding: 4px; font-size: 11px; border: 1px solid #cbd5e1; border-radius: 3px; }
        .form-submit-btn { width: 100%; padding: 6px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .form-submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #list-container { display: none; height: 35vh; background: #ffffff; border-top: 3px solid #17a2b8; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); z-index: 1010; overflow: hidden; flex-direction: column; }
        .list-header { background: #f1f5f9; padding: 10px 15px; border-bottom: 1px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .list-header h3 { margin: 0; font-size: 15px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .list-btn-group { display: flex; gap: 8px; }
        .list-btn { padding: 5px 12px; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; color: white; }
        .btn-csv { background-color: #28a745; } .btn-print { background-color: #6c757d; } .btn-close { background-color: #ef4444; }
        .table-wrapper { flex: 1; overflow-y: auto; padding: 0 15px 15px 15px; }
        .result-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .result-table th { background: #334155; color: white; position: sticky; top: 0; padding: 8px; text-align: left; }
        .result-table td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .result-table tr:nth-child(even) { background: #f8fafc; }
        .result-table tr:hover { background: #f1f5f9; cursor: pointer; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .badge-alert { background-color: #ef4444; } .badge-ok { background-color: #3b82f6; }

        @media print {
            body { height: auto; overflow: visible; }
            #search-panel, .side-btn-container, #map, .list-header, .btn-close, .btn-csv, .btn-print, #loading, #mode-overlay, #current-mode-badge { display: none !important; }
            #list-container { display: block !important; height: auto !important; border-top: none !important; box-shadow: none !important; position: static !important; }
            .table-wrapper { overflow: visible !important; padding: 0 !important; }
            .result-table { border: 1px solid #000; page-break-inside: auto; }
            .result-table tr { page-break-inside: avoid; page-break-after: auto; }
            .result-table th { background: #f1f5f9 !important; color: #000 !important; border-bottom: 2px solid #000; }
            .result-table td { border-bottom: 1px solid #000; color: #000; }
            #print-title { display: block !important; margin-bottom: 20px; text-align: center; }
        }
        #print-title { display: none; }

        @media (max-width: 600px) { #search-panel select { width: calc(50% - 4px); } #search-panel .date-group { width: 100%; } #search-panel input { width: 100%; } .leaflet-top { top: 60px; } }
    </style>
</head>
<body>
    
    <div id="mode-overlay">
        <div class="mode-title">🗺️ 地水利マップシステム</div>
        <button class="mode-btn mode-view" onclick="startApp('view')">👀 閲覧モードで開始</button>
        <div class="mode-desc">データの確認や検索のみ行います（誤操作防止）</div>
        <button class="mode-btn mode-edit" onclick="startApp('edit')">🛠️ 点検モードで開始</button>
        <div class="mode-desc">現場で点検結果を入力し、台帳を更新します</div>
    </div>

    <div id="current-mode-badge"></div>
    <div id="print-title">
        <h1 style="font-size: 20px; margin-bottom: 5px;">地水利点検状況 報告書</h1>
        <p style="font-size: 11px; margin: 0; color: #555;">出力日: <span id="print-date"></span> | フィルタ条件適用済リスト</p>
    </div>

    <div id="main-container">
        <div id="search-panel">
            <select id="filter-area"><option value="">🌐 すべての地区</option></select>
            <select id="filter-status"><option value="">🟢 すべての状態</option><option value="要点検">🔴 要点検のみ</option><option value="点検済">🔵 点検済のみ</option></select>
            <div class="date-group">
                <input type="date" id="filter-date" placeholder="点検日">
                <select id="filter-date-cond" style="min-width: 100px; flex-grow: 0;"><option value="before">以前に点検</option><option value="after">以降に点検</option></select>
            </div>
            <input type="text" id="search-text" placeholder="水利番号などで検索...">
            <button id="search-btn">検索・絞り込み</button>
        </div>

        <div id="loading">📡 最新データを読み込み中...</div>
        <div id="map"></div>
        
        <div class="side-btn-container">
            <button id="search-toggle-btn" class="action-btn">🔍 検索 / 絞込</button>
            <button id="list-toggle-btn" class="action-btn">📊 リスト (<span id="list-count">0</span>)</button>
            <button id="today-list-btn" class="action-btn">📅 今日の点検リスト</button>
            <button id="gps-btn" class="action-btn">📍 現在地</button>
        </div>
    </div>

    <div id="list-container">
        <div class="list-header">
            <h3>📊 抽出水利一覧リスト (<span id="table-count">0</span>件)</h3>
            <div class="list-btn-group">
                <button class="list-btn btn-csv" onclick="downloadCSV()">📥 Excel/CSV出力</button>
                <button class="list-btn btn-print" onclick="printReport()">🖨️ 報告書印刷</button>
                <button class="list-btn btn-close" onclick="toggleList(false)">✕ 閉じる</button>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="result-table">
                <thead><tr><th>水利番号</th><th>地区</th><th>種別</th><th>区分</th><th>前回調査日</th><th>要調査</th><th>点検結果</th><th>異常の種類</th><th>コメント</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([34.2305, 135.1705], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);

        // 🌟最新のURL🌟
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxIVWN3_EzzvlFTngR7sG2HjZNQTi1-L4HnqyPp3m-Zq6h4f4z5G6WVWwMPNegoziq_Tw/exec";

        let allData = []; 
        let currentFilteredData = [];
        let appMode = 'view'; 
        let markersGroup = L.markerClusterGroup({ disableClusteringAtZoom: 16, maxClusterRadius: 50 });
        map.addLayer(markersGroup);

        window.startApp = function(mode) {
            appMode = mode;
            document.getElementById('mode-overlay').style.display = 'none';
            let badge = document.getElementById('current-mode-badge');
            badge.style.display = 'block';
            if (mode === 'view') { badge.innerText = '👀 閲覧モード'; badge.style.backgroundColor = '#3b82f6'; } 
            else { badge.innerText = '🛠️ 点検モード'; badge.style.backgroundColor = '#ef4444'; }
            document.getElementById('loading').style.display = 'block';
            loadData();
        };

        document.getElementById('search-toggle-btn').addEventListener('click', function() {
            let panel = document.getElementById('search-panel');
            if (panel.style.display === 'flex') { panel.style.display = 'none'; this.style.backgroundColor = '#f59e0b'; } 
            else { panel.style.display = 'flex'; this.style.backgroundColor = '#d97706'; }
        });

        function parseLocalDate(dateStr) {
            if (!dateStr || dateStr === "00年00月00日" || dateStr === "0") return new Date(2000, 0, 1);
            let s = String(dateStr).trim();
            const parts = s.split(/[-/]/);
            if (parts.length >= 3) return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
            let d = new Date(s);
            return isNaN(d.getTime()) ? new Date(2000, 0, 1) : d;
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_API_URL);
                allData = await response.json(); 
                
                let areas = [...new Set(allData.map(row => row["地区"]).filter(a => a))].sort();
                let areaSelect = document.getElementById('filter-area');
                areaSelect.innerHTML = '<option value="">🌐 すべての地区</option>';
                areas.forEach(area => { let option = document.createElement('option'); option.value = option.innerText = area; areaSelect.appendChild(option); });

                currentFilteredData = [...allData];
                renderMarkers(allData);
                updateListTable(allData);

                document.getElementById('loading').style.display = 'none';
                map.locate({setView: true, maxZoom: 17}); 
            } catch (error) {
                alert("データの読み込みに失敗しました。URLが正しいか確認してください。");
                document.getElementById('loading').innerText = "❌ 読み込みエラー";
            }
        }

        function renderMarkers(dataToRender) {
            markersGroup.clearLayers(); 

            dataToRender.forEach(function(row) {
                if (!row["緯度"] || !row["経度"]) return;

                let isAlert = (row["要調査"] === "要点検");
                let className = (row["水利種別"] === "消火栓") ? "marker-hydrant" : "marker-tank";
                if (isAlert) className += " alert-marker";

                let customIcon = L.divIcon({ className: className });

                let popupContent = `
                    <div class="popup-title">${row["水利種別"]} (${row["水利番号"]})</div>
                    ${isAlert ? `<div class="popup-alert">⚠️ 要点検</div>` : ''}
                    <table class="popup-table">
                        <tr><th>地区</th><td>${row["地区"] || "-"}</td></tr>
                        <tr><th>区分</th><td>${row["設置区分"] || "-"}</td></tr>
                        <tr><th>前回点検</th><td>${row["前回調査日"] || "未実施"}</td></tr>
                        <tr><th>点検結果</th><td>${row["点検結果"] || "未入力"}</td></tr>
                        <tr><th>異常の種類</th><td>${row["異常の種類"] || "-"}</td></tr>
                        <tr><th>塗装レベル</th><td>${row["塗装レベル"] || "-"}</td></tr>
                        <tr><th>コメント</th><td>${row["コメント"] || "-"}</td></tr>
                    </table>
                `;

                if (appMode === 'edit') {
                    popupContent += `
                        <button class="form-toggle" onclick="toggleForm('${row["水利番号"]}')">📝 点検結果を入力する</button>
                        <div class="input-form" id="form-${row["水利番号"]}">
                            <div class="form-group"><label>点検結果</label><select id="input-result-${row["水利番号"]}"><option value="点検済">点検済（良好）</option><option value="要対応">要対応（不備あり）</option><option value="未実施">未点検</option></select></div>
                            <div class="form-group"><label>異常の種類</label><select id="input-error-${row["水利番号"]}"><option value="なし">異常なし</option><option value="蓋破損">蓋の破損</option><option value="泥溜まり">土砂・泥溜まり</option><option value="バルブ不良">バルブ開閉不良</option><option value="その他">その他</option></select></div>
                            <div class="form-group"><label>塗装レベル</label><select id="input-paint-${row["水利番号"]}"><option value="良">良（必要なし）</option><option value="普通">普通（経年）</option><option value="要塗装">要塗装（ハゲ）</option></select></div>
                            <div class="form-group"><label>コメント</label><input type="text" id="input-comment-${row["水利番号"]}" placeholder="状況など"></div>
                            <button class="form-submit-btn" id="btn-${row["水利番号"]}" onclick="submitReport('${row["水利番号"]}')">スプレッドシートへ送信</button>
                        </div>
                    `;
                }

                L.marker([row["緯度"], row["経度"]], {icon: customIcon}).bindPopup(popupContent).addTo(markersGroup);
            });
            if (dataToRender.length > 0) map.fitBounds(markersGroup.getBounds(), { padding: [50, 50] });
        }

        window.toggleForm = function(id) {
            let form = document.getElementById("form-" + id);
            form.style.display = (form.style.display === "block") ? "none" : "block";
        };

        // 🌟送信処理（より安全なGETベース通信に改修）🌟
        window.submitReport = async function(id) {
            let btn = document.getElementById("btn-" + id);
            let resultVal = document.getElementById("input-result-" + id).value;
            let errorVal = document.getElementById("input-error-" + id).value;
            let paintVal = document.getElementById("input-paint-" + id).value;
            let commentVal = document.getElementById("input-comment-" + id).value;

            btn.disabled = true;
            btn.innerText = "送信中...";

            // JSONPに近い形で確実にGoogle Apps Scriptに届ける
            let url = `${GAS_API_URL}?action=update&id=${encodeURIComponent(id)}&result=${encodeURIComponent(resultVal)}&error=${encodeURIComponent(errorVal)}&paint=${encodeURIComponent(paintVal)}&comment=${encodeURIComponent(commentVal)}&t=${Date.now()}`;

            try {
                // 確実に通信を通すための設定
                let response = await fetch(url, { method: 'GET', mode: 'cors' });
                let res = await response.json();

                if (res.status === "Success") {
                    btn.innerText = "送信完了！";
                    btn.style.backgroundColor = "#28a745";

                    let targetIndex = allData.findIndex(row => row["水利番号"] === id);
                    if (targetIndex !== -1) {
                        let today = new Date();
                        let y = today.getFullYear();
                        let m = ("0" + (today.getMonth() + 1)).slice(-2);
                        let d = ("0" + today.getDate()).slice(-2);
                        let todayStr = `${y}/${m}/${d}`; // yyyy/MM/dd 形式に統一
                        
                        allData[targetIndex]["前回調査日"] = todayStr;
                        allData[targetIndex]["要調査"] = "点検済";
                        allData[targetIndex]["点検結果"] = resultVal;
                        allData[targetIndex]["異常の種類"] = errorVal;
                        allData[targetIndex]["塗装レベル"] = paintVal;
                        allData[targetIndex]["コメント"] = commentVal;
                    }

                    setTimeout(() => {
                        map.closePopup();
                        // 送信成功したら、現在の検索状態を維持したまま地図を更新
                        document.getElementById('search-btn').click();
                    }, 1500);

                } else {
                    alert("送信エラー: " + res.message);
                    btn.disabled = false; btn.innerText = "送信失敗（再試行）";
                }
            } catch (err) {
                // 通信エラー時の詳細な表示
                console.error(err);
                alert("送信に失敗しました。電波状態を確認してください。");
                btn.disabled = false; btn.innerText = "スプレッドシートへ送信";
            }
        };

        function updateListTable(data) {
            let tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            document.getElementById('list-count').innerText = data.length;
            document.getElementById('table-count').innerText = data.length;

            data.forEach(row => {
                let tr = document.createElement('tr');
                let badgeClass = (row["要調査"] === "要点検") ? "badge-alert" : "badge-ok";
                tr.innerHTML = `<td style="font-weight:bold;">${row["水利番号"]}</td><td>${row["地区"]||"-"}</td><td>${row["水利種別"]}</td><td>${row["設置区分"]||"-"}</td><td style="font-weight:bold; color:#0369a1;">${row["前回調査日"]||"未実施"}</td><td><span class="badge ${badgeClass}">${row["要調査"]}</span></td><td>${row["点検結果"]||"-"}</td><td>${row["異常の種類"]||"-"}</td><td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${row["コメント"]||"-"}</td>`;
                tr.addEventListener('click', () => {
                    if (row["緯度"] && row["経度"]) {
                        toggleList(false); map.setView([row["緯度"], row["経度"]], 18);
                        setTimeout(() => { markersGroup.eachLayer(marker => { if (marker.getLatLng().lat == row["緯度"] && marker.getLatLng().lng == row["経度"]) marker.openPopup(); }); }, 300);
                    }
                });
                tbody.appendChild(tr);
            });
        }

        window.toggleList = function(show) {
            let container = document.getElementById('list-container');
            container.style.display = (show !== undefined) ? (show ? 'flex' : 'none') : (container.style.display === 'flex' ? 'none' : 'flex');
        };
        document.getElementById('list-toggle-btn').addEventListener('click', () => toggleList());

        // 🌟今日の点検リスト専用機能（日付判定をより厳密に）🌟
        document.getElementById('today-list-btn').addEventListener('click', function() {
            let today = new Date();
            let y = today.getFullYear();
            let m = ("0" + (today.getMonth() + 1)).slice(-2);
            let d = ("0" + today.getDate()).slice(-2);
            let todayStr1 = `${y}/${m}/${d}`; // 例：2026/06/10
            let todayStr2 = `${y}/${today.getMonth() + 1}/${today.getDate()}`; // 例：2026/6/10

            currentFilteredData = allData.filter(row => row["前回調査日"] === todayStr1 || row["前回調査日"] === todayStr2);

            renderMarkers(currentFilteredData);
            updateListTable(currentFilteredData);
            toggleList(true); 

            if (window.innerWidth <= 600) { document.getElementById('search-panel').style.display = 'none'; document.getElementById('search-toggle-btn').style.backgroundColor = '#f59e0b'; }
        });

        window.downloadCSV = function() {
            if (currentFilteredData.length === 0) return alert("リストが空です");
            let csvContent = "\uFEFF水利番号,地区,水利種別,設置区分,前回調査日,要調査,点検結果,異常の種類,塗装レベル,コメント\r\n";
            currentFilteredData.forEach(row => { csvContent += [row["水利番号"], row["地区"]||"-", row["水利種別"], row["設置区分"]||"-", row["前回調査日"]||"未実施", row["要調査"], row["点検結果"]||"-", row["異常の種類"]||"-", row["塗装レベル"]||"-", (row["コメント"]||"-").replace(/,/g, "，")].join(",") + "\r\n"; });
            let link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = `地水利点検リスト_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        window.printReport = function() {
            document.getElementById('print-date').innerText = `${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日`;
            window.print();
        };

        document.getElementById('search-btn').addEventListener('click', function() {
            let selectedArea = document.getElementById('filter-area').value;
            let selectedStatus = document.getElementById('filter-status').value;
            let keyword = document.getElementById('search-text').value.trim().toLowerCase();
            let filterDateVal = document.getElementById('filter-date').value;
            let filterDateCond = document.getElementById('filter-date-cond').value;
            let filterDateTime = filterDateVal ? parseLocalDate(filterDateVal).getTime() : null;

            currentFilteredData = allData.filter(row => {
                let matchArea = (selectedArea === "") || (row["地区"] === selectedArea);
                let matchStatus = (selectedStatus === "") || (row["要調査"] === selectedStatus);
                let matchDate = true;
                if (filterDateTime && row["前回調査日"]) {
                    let rowDateTime = parseLocalDate(row["前回調査日"]).getTime();
                    if (filterDateCond === "before") matchDate = (rowDateTime <= filterDateTime);
                    else if (filterDateCond === "after") matchDate = (rowDateTime >= filterDateTime);
                }
                let matchKeyword = true;
                if (keyword !== "") matchKeyword = (row["水利番号"] + row["水利種別"] + (row["コメント"] || "")).toLowerCase().includes(keyword);
                return matchArea && matchStatus && matchDate && matchKeyword;
            });
            renderMarkers(currentFilteredData);
            updateListTable(currentFilteredData);
            if (window.innerWidth <= 600) { document.getElementById('search-panel').style.display = 'none'; document.getElementById('search-toggle-btn').style.backgroundColor = '#f59e0b'; }
        });

        let currentLocationMarker = null;
        document.getElementById('gps-btn').addEventListener('click', function() { map.locate({setView: true, maxZoom: 17}); });
        map.on('locationfound', function(e) {
            if (currentLocationMarker) map.removeLayer(currentLocationMarker);
            currentLocationMarker = L.circleMarker(e.latlng, { radius: 8, fillColor: "#007bff", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 0.9 }).addTo(map).bindPopup("<b>現在地</b>").openPopup();
        });
    </script>
</body>
</html>
